name: Update Document Archive

on:
  push:
    paths:
      - 'daewon/**'
      - 'safety/**'
      # 새 프로젝트 폴더 추가 시 여기에 함께 추가
  workflow_dispatch: # 수동 실행도 가능

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run archive updater
        run: python scripts/update_archive.py

      - name: Commit & Push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: auto-update archive index [skip ci]" && git push
