<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로젝트 문서 아카이브</title>
<style>
  :root {
    --bg: #f5f4f0; --bg2: #ffffff; --bg3: #eeecea;
    --text: #1a1a18; --text2: #5a5955; --text3: #9c9a92;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --blue: #185FA5; --blue-bg: #E6F1FB;
    --teal: #0F6E56; --teal-bg: #E1F5EE;
    --amber: #854F0B; --amber-bg: #FAEEDA; --amber-mid: #EF9F27;
    --coral: #993C1D; --coral-bg: #FAECE7;
    --green: #3B6D11; --green-bg: #EAF3DE;
    --purple: #534AB7; --purple-bg: #EEEDFE;
    --red: #A32D2D; --red-bg: #FCEBEB;
    --gray: #5F5E5A; --gray-bg: #F1EFE8;
    --radius: 12px; --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --bg2: #242422; --bg3: #2e2e2b;
      --text: #e8e6de; --text2: #a8a69e; --text3: #6e6c65;
      --border: rgba(255,255,255,0.09); --border2: rgba(255,255,255,0.16);
      --blue: #85B7EB; --blue-bg: #042C53;
      --teal: #5DCAA5; --teal-bg: #04342C;
      --amber: #FAC775; --amber-bg: #412402; --amber-mid: #EF9F27;
      --coral: #F0997B; --coral-bg: #4A1B0C;
      --green: #97C459; --green-bg: #173404;
      --purple: #AFA9EC; --purple-bg: #26215C;
      --red: #F09595; --red-bg: #501313;
      --gray: #B4B2A9; --gray-bg: #2C2C2A;
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.7; }
  .layout { display: flex; min-height: 100vh; }

  /* ── SIDEBAR ── */
  nav { width: 256px; flex-shrink: 0; background: var(--bg2); border-right: 0.5px solid var(--border); position: sticky; top: 0; height: 100vh; overflow-y: auto; padding: 24px 0 40px; }
  nav .logo { padding: 0 20px 20px; border-bottom: 0.5px solid var(--border); margin-bottom: 12px; }
  nav .logo .tag { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; margin-bottom: 4px; }
  nav .logo .title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.45; }
  nav .nav-section { padding: 16px 20px 6px; font-size: 10px; font-weight: 500; letter-spacing: 0.08em; color: var(--text3); text-transform: uppercase; }
  nav ul { list-style: none; padding: 0 8px; }
  nav ul li a { display: flex; align-items: flex-start; gap: 8px; padding: 8px 12px; border-radius: 6px; font-size: 13px; color: var(--text2); text-decoration: none; transition: background .15s, color .15s; line-height: 1.4; }
  nav ul li a:hover { background: var(--bg3); color: var(--text); }
  nav ul li a.active { background: var(--purple-bg); color: var(--purple); font-weight: 500; }
  nav ul li a .nav-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  nav ul li a .nav-label { flex: 1; }
  nav ul li a .nav-count { flex-shrink: 0; font-size: 11px; font-weight: 500; background: var(--bg3); color: var(--text3); border-radius: 20px; padding: 1px 7px; margin-top: 1px; }
  nav ul li a.active .nav-count { background: var(--purple); color: #fff; }

  /* ── MAIN ── */
  main { flex: 1; max-width: 860px; padding: 48px 40px 100px; }

  /* ── PAGE HEADER ── */
  .page-header { margin-bottom: 40px; padding-bottom: 32px; border-bottom: 0.5px solid var(--border); }
  .page-header .eyebrow { font-size: 12px; font-weight: 500; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
  .page-header h1 { font-size: 26px; font-weight: 500; line-height: 1.3; margin-bottom: 6px; }
  .page-header .subtitle { font-size: 15px; color: var(--text2); }

  /* ── SEARCH ── */
  .search-wrap { position: relative; margin-bottom: 32px; }
  .search-wrap input { width: 100%; padding: 11px 16px 11px 40px; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); font-size: 13px; color: var(--text); font-family: inherit; outline: none; transition: border-color .15s; }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-wrap input:focus { border-color: var(--purple); }
  .search-wrap .s-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; pointer-events: none; }

  /* ── PROJECT BLOCK ── */
  .project-block { margin-bottom: 52px; scroll-margin-top: 28px; }
  .project-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 0.5px solid var(--border); }
  .project-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; margin-top: 2px; }
  .project-info { flex: 1; min-width: 0; }
  .project-info .p-label { font-size: 11px; font-weight: 500; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
  .project-info h2 { font-size: 18px; font-weight: 500; color: var(--text); line-height: 1.35; margin-bottom: 8px; }
  .project-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  /* ── FILE LIST ── */
  .file-list { display: flex; flex-direction: column; gap: 8px; }
  .file-row { display: flex; align-items: center; gap: 14px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 14px 18px; text-decoration: none; color: inherit; transition: border-color .15s, box-shadow .15s; }
  .file-row:hover { border-color: var(--border2); box-shadow: 0 1px 8px rgba(0,0,0,0.06); }
  .file-type-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .file-body { flex: 1; min-width: 0; }
  .file-title { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.35; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-desc { font-size: 12px; color: var(--text3); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .file-date { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .file-arrow { font-size: 16px; color: var(--text3); }

  /* ── BADGE ── */
  .badge { display: inline-block; font-size: 11px; font-weight: 500; border-radius: 20px; padding: 2px 9px; white-space: nowrap; }
  .badge-blue   { background: var(--blue-bg);   color: var(--blue); }
  .badge-teal   { background: var(--teal-bg);   color: var(--teal); }
  .badge-amber  { background: var(--amber-bg);  color: var(--amber); }
  .badge-gray   { background: var(--gray-bg);   color: var(--gray); }
  .badge-green  { background: var(--green-bg);  color: var(--green); }
  .badge-purple { background: var(--purple-bg); color: var(--purple); }
  .badge-coral  { background: var(--coral-bg);  color: var(--coral); }

  .type-report  { background: var(--blue-bg); }
  .type-note    { background: var(--purple-bg); }
  .type-spec    { background: var(--teal-bg); }
  .type-data    { background: var(--amber-bg); }
  .type-etc     { background: var(--gray-bg); }

  /* ── EMPTY ── */
  .empty-row { background: var(--bg2); border: 0.5px dashed var(--border2); border-radius: var(--radius-sm); padding: 18px 20px; font-size: 13px; color: var(--text3); }

  /* ── NO RESULT ── */
  .no-result { text-align: center; padding: 60px 0; color: var(--text3); font-size: 14px; }
  .no-result .nr-icon { font-size: 36px; margin-bottom: 12px; }

  @media (max-width: 720px) {
    nav { display: none; }
    main { padding: 28px 18px 60px; }
    .file-desc, .file-date { display: none; }
  }
</style>
</head>
<body>
<div class="layout">

<nav id="sidebar"></nav>

<main>
  <div class="page-header">
    <div class="eyebrow">Document Archive</div>
    <h1>프로젝트 문서 아카이브</h1>
    <p class="subtitle">프로젝트별 보고서·연구노트·설계문서를 한 곳에서 관리합니다.</p>
  </div>

  <div class="search-wrap">
    <span class="s-icon">🔍</span>
    <input type="text" id="search" placeholder="문서 제목, 태그, 설명으로 검색…" oninput="render()">
  </div>

  <div id="content"></div>
</main>
</div>

<!-- ════════════════════════════════════════════════════════════════
     ★  데이터 영역  —  여기만 수정하면 됩니다
════════════════════════════════════════════════════════════════ -->
<script>

// ── 문서 타입 정의 ──────────────────────────────────────────────
// type 값 하나만 지정하면 아이콘·배지 색상 자동 적용
const DOC_TYPE = {
  report: { label: '보고서',   icon: '📄', bg: 'type-report',  badge: 'badge-blue'   },
  note:   { label: '연구노트', icon: '🔬', bg: 'type-note',    badge: 'badge-purple' },
  spec:   { label: '설계문서', icon: '📐', bg: 'type-spec',    badge: 'badge-teal'   },
  data:   { label: '데이터',   icon: '📊', bg: 'type-data',    badge: 'badge-amber'  },
  etc:    { label: '기타',     icon: '📎', bg: 'type-etc',     badge: 'badge-gray'   },
};

// ── 프로젝트 & 파일 데이터 ──────────────────────────────────────
const projects = [

  // ╔══════════════════════════════════════════════════════════════╗
  // ║  프로젝트 1  —  대원공업㈜                                    ║
  // ╚══════════════════════════════════════════════════════════════╝
  {
    id: "daewon",
    icon: "🏭",
    iconBg: "#E6F1FB",
    label: "수요기관 · 대원공업㈜",
    title: "자동 분체 도장라인 멀티모달 AI 불량예방 시스템",
    color: "blue",          // 프로젝트 테마 (badge 색상)
    files: [
      {
        "title": "비전 전처리 설계 연구노트 — Case A",
        "desc": "고정 ROI 기반 Optical Flow → CNN → GRU 파이프라인",
        "file": "비전_전처리_연구노트_v1.html",
        "type": "note",
        "date": "2025-06",
        "tags": ["Optical Flow", "GRU", "Edge AI"]
      },
      {
        "title": "비전 전처리 설계 연구노트 — Case B",
        "desc": "YOLO 검출 기반 동적 ROI, ID별 독립 시퀀스 버퍼",
        "file": "비전_전처리_연구노트_CaseB_v1.html",
        "type": "note",
        "date": "2025-07",
        "tags": ["YOLO", "ByteTrack", "Optical Flow", "GRU"]
      },
      {
        "title": "AI 불량예방 시스템 보고서 v4",
        "desc": "멀티모달 AI 불량예방 시스템 설계·성과 종합 보고서",
        "file": "AI_불량예방_시스템_보고서_v4.html",
        "type": "report",
        "date": "2025-07",
        "tags": ["멀티모달", "불량예방"]
      },
      {
        "title": "발표자료 — AI 솔루션 개발 실증저변확대형 (주식회사 뎁스)",
        "desc": "실증저변확대형 사업 최종 발표 슬라이드 Rev1.0",
        "file": "09_발표자료_AI솔루션_개발_실증저변확대형_주식회사_뎁스_Rev1_0.pdf",
        "type": "etc",
        "date": "2025-07",
        "tags": ["발표자료", "실증저변확대형"]
      },
      // ← 새 파일은 여기에 객체 하나 추가
    ],
  },

  // ╔══════════════════════════════════════════════════════════════╗
  // ║  프로젝트 2  —  중소 제조현장 사고 탐지                       ║
  // ╚══════════════════════════════════════════════════════════════╝
  {
    id: "safety",
    icon: "⚠️",
    iconBg: "#FAEEDA",
    label: "중소 제조현장",
    title: "사고 실시간 탐지 시스템",
    color: "amber",
    files: [
      // ← 파일 추가 시 여기에
    ],
  },

  // ── 새 프로젝트 추가 템플릿 (주석 해제 후 수정) ──────────────────
  // {
  //   id: "project-id",          // 영문, 하이픈만 사용
  //   icon: "🔧",
  //   iconBg: "#E1F5EE",
  //   label: "수요기관 · 회사명",
  //   title: "프로젝트 이름",
  //   color: "teal",             // blue | teal | amber | purple | green | gray | coral
  //   files: [
  //     {
  //       title: "문서 제목",
  //       desc: "한 줄 설명",
  //       file: "폴더명/파일명.html",
  //       type: "note",          // report | note | spec | data | etc
  //       date: "2025-08",
  //       tags: ["태그1", "태그2"],
  //     },
  //   ],
  // },
];


// ════════════════════════════════════════════════════════════════
//  렌더링 (수정 불필요)
// ════════════════════════════════════════════════════════════════
function typeOf(t) { return DOC_TYPE[t] || DOC_TYPE.etc; }

function render() {
  const q = (document.getElementById('search').value || '').toLowerCase().trim();

  // ── 사이드바 ──
  let navHTML = `
    <div class="logo">
      <div class="tag">Document Archive</div>
      <div class="title">프로젝트 문서 아카이브</div>
    </div>
    <div class="nav-section">프로젝트</div>
    <ul>`;
  projects.forEach(p => {
    navHTML += `
      <li><a href="#${p.id}">
        <span class="nav-icon">${p.icon}</span>
        <span class="nav-label">${p.title}</span>
        <span class="nav-count">${p.files.length}</span>
      </a></li>`;
  });
  navHTML += `</ul>`;
  document.getElementById('sidebar').innerHTML = navHTML;

  // ── 메인 콘텐츠 ──
  let html = '';
  let anyResult = false;

  projects.forEach(p => {
    const filtered = q
      ? p.files.filter(f =>
          f.title.toLowerCase().includes(q) ||
          (f.desc||'').toLowerCase().includes(q) ||
          (f.tags||[]).some(t => t.toLowerCase().includes(q))
        )
      : p.files;

    if (q && filtered.length === 0) return;
    anyResult = true;

    const types = [...new Set(filtered.map(f => f.type))];

    html += `
    <div class="project-block" id="${p.id}">
      <div class="project-header">
        <div class="project-icon" style="background:${p.iconBg}">${p.icon}</div>
        <div class="project-info">
          <div class="p-label">${p.label}</div>
          <h2>${p.title}</h2>
          <div class="project-meta">
            <span class="badge badge-${p.color}">파일 ${filtered.length}개</span>
            ${types.map(t => `<span class="badge ${typeOf(t).badge}">${typeOf(t).label}</span>`).join('')}
          </div>
        </div>
      </div>
      <div class="file-list">`;

    if (filtered.length === 0) {
      html += `<div class="empty-row">📭 &nbsp;아직 등록된 파일이 없습니다. <code>files</code> 배열에 항목을 추가하세요.</div>`;
    } else {
      filtered.forEach(f => {
        const t = typeOf(f.type);
        const tags = (f.tags||[]).map(tag =>
          `<span class="badge badge-gray" style="font-size:10px;padding:1px 7px">${tag}</span>`
        ).join('');
        html += `
        <a class="file-row" href="${f.file}">
          <div class="file-type-icon ${t.bg}">${t.icon}</div>
          <div class="file-body">
            <div class="file-title">${f.title}</div>
            <div class="file-desc">${f.desc || ''}</div>
          </div>
          <div class="file-right">
            <span class="badge ${t.badge}">${t.label}</span>
            ${tags}
            <span class="file-date">${f.date || ''}</span>
            <span class="file-arrow">›</span>
          </div>
        </a>`;
      });
    }

    html += `</div></div>`;
  });

  if (!anyResult) {
    html = `<div class="no-result"><div class="nr-icon">🔍</div><div>"${q}"에 해당하는 문서가 없습니다</div></div>`;
  }

  document.getElementById('content').innerHTML = html;
  bindScrollSpy();
}

// 스크롤 spy
function bindScrollSpy() {
  window.onscroll = () => {
    const blocks = document.querySelectorAll('.project-block');
    const links  = document.querySelectorAll('nav ul li a');
    let cur = '';
    blocks.forEach(b => { if (b.getBoundingClientRect().top <= 80) cur = b.id; });
    links.forEach(a => {
      a.classList.toggle('active', a.getAttribute('href') === `#${cur}`);
    });
  };
}

// 앵커 부드러운 스크롤
document.addEventListener('click', e => {
  const a = e.target.closest('a[href^="#"]');
  if (!a) return;
  e.preventDefault();
  const el = document.getElementById(a.getAttribute('href').slice(1));
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
});

render();
</script>
</body>
</html>
