<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Notes Archive</title>
<style>
  /* ── 토큰 ── */
  :root {
    --bg:      #F4F3EF; --bg2: #FFFFFF; --bg3: #ECEAE4;
    --text:    #1C1B18; --text2: #5C5A53; --text3: #9A9890;
    --border:  rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14);
    --blue:    #1558A8; --blue-bg:   #E4EFFE;
    --teal:    #0A6B52; --teal-bg:   #DFF5ED;
    --amber:   #7E4B08; --amber-bg:  #FAF0D8;
    --coral:   #953A1A; --coral-bg:  #FAECE6;
    --green:   #376510; --green-bg:  #E8F2DC;
    --purple:  #4F46B0; --purple-bg: #ECEAFD;
    --gray:    #5A5955; --gray-bg:   #EFEDE6;
    --red:     #9E2A2A; --red-bg:    #FBEAEA;
    --r: 10px; --rs: 7px;
    --sidebar: 248px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#1B1B18; --bg2:#232320; --bg3:#2C2C28;
      --text:#E6E4DC; --text2:#A6A49C; --text3:#6A6860;
      --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
      --blue:#7EB5F0; --blue-bg:#022850;
      --teal:#52C9A2; --teal-bg:#023328;
      --amber:#F5C36A; --amber-bg:#3E2301;
      --coral:#EE9270; --coral-bg:#481808;
      --green:#93C253; --green-bg:#153202;
      --purple:#AAA5EA; --purple-bg:#231F58;
      --gray:#B2B09A; --gray-bg:#2A2A26;
      --red:#EE9090; --red-bg:#4C1010;
    }
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Apple SD Gothic Neo',sans-serif;
       background:var(--bg);color:var(--text);font-size:14px;line-height:1.7}

  /* ── 레이아웃 ── */
  .shell{display:flex;min-height:100vh}

  /* ── 사이드바 ── */
  aside{
    width:var(--sidebar);flex-shrink:0;
    background:var(--bg2);border-right:.5px solid var(--border);
    position:sticky;top:0;height:100vh;overflow-y:auto;
    padding:20px 0 48px;display:flex;flex-direction:column;gap:0
  }
  .aside-logo{padding:0 16px 18px;border-bottom:.5px solid var(--border);margin-bottom:10px}
  .aside-logo .al-tag{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--text3);text-transform:uppercase;margin-bottom:3px}
  .aside-logo .al-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.4}
  .aside-sec{padding:14px 16px 5px;font-size:10px;font-weight:600;letter-spacing:.09em;color:var(--text3);text-transform:uppercase}
  aside ul{list-style:none;padding:0 8px}
  aside ul li a{
    display:flex;align-items:center;gap:8px;padding:7px 10px;
    border-radius:6px;font-size:12.5px;color:var(--text2);text-decoration:none;
    transition:background .12s,color .12s;line-height:1.4
  }
  aside ul li a:hover{background:var(--bg3);color:var(--text)}
  aside ul li a.active{background:var(--purple-bg);color:var(--purple);font-weight:500}
  aside ul li a .ni{font-size:13px;flex-shrink:0}
  aside ul li a .nl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  aside ul li a .nc{font-size:10px;font-weight:600;background:var(--bg3);color:var(--text3);border-radius:20px;padding:1px 6px;flex-shrink:0}
  aside ul li a.active .nc{background:var(--purple);color:#fff}

  /* 사이드바 서브 아이템 */
  aside ul li.sub a{padding-left:28px;font-size:12px}

  /* ── 메인 ── */
  main{flex:1;min-width:0;padding:40px 36px 100px}

  /* ── 페이지 헤더 ── */
  .ph{margin-bottom:28px}
  .ph .ph-eye{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
  .ph h1{font-size:22px;font-weight:500;line-height:1.3;margin-bottom:4px}
  .ph .ph-sub{font-size:13.5px;color:var(--text2)}

  /* ── 탭 ── */
  .tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--rs);padding:3px;width:fit-content;margin-bottom:24px}
  .tab-btn{
    padding:6px 18px;border-radius:5px;font-size:12.5px;font-weight:500;
    color:var(--text2);background:transparent;border:none;cursor:pointer;
    transition:background .15s,color .15s;font-family:inherit
  }
  .tab-btn.on{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}

  /* ── 검색 ── */
  .search-wrap{position:relative;margin-bottom:28px}
  .search-wrap input{
    width:100%;padding:9px 14px 9px 36px;
    background:var(--bg2);border:.5px solid var(--border2);border-radius:var(--rs);
    font-size:13px;color:var(--text);font-family:inherit;outline:none;
    transition:border-color .15s
  }
  .search-wrap input::placeholder{color:var(--text3)}
  .search-wrap input:focus{border-color:var(--purple)}
  .search-wrap .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}

  /* ── 섹션 (주제 or 프로젝트) ── */
  .section-block{margin-bottom:44px;scroll-margin-top:24px}
  .section-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;padding-bottom:14px;border-bottom:.5px solid var(--border)}
  .sh-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;margin-top:1px}
  .sh-info{flex:1;min-width:0}
  .sh-info .shi-label{font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
  .sh-info h2{font-size:16px;font-weight:500;color:var(--text);line-height:1.35;margin-bottom:6px}
  .sh-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}

  /* ── 서브폴더 그룹 ── */
  .subfolder{margin-bottom:12px}
  .subfolder-label{
    display:flex;align-items:center;gap:6px;
    font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:var(--text3);margin-bottom:7px;padding-left:2px
  }
  .subfolder-label::after{content:'';flex:1;height:.5px;background:var(--border)}

  /* ── 파일 행 ── */
  .file-list{display:flex;flex-direction:column;gap:6px}
  .file-row{
    display:flex;align-items:center;gap:12px;
    background:var(--bg2);border:.5px solid var(--border);border-radius:var(--rs);
    padding:11px 15px;text-decoration:none;color:inherit;
    transition:border-color .14s,box-shadow .14s
  }
  .file-row:hover{border-color:var(--border2);box-shadow:0 1px 6px rgba(0,0,0,.05)}
  .ft-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
  .fb{flex:1;min-width:0}
  .fb .ft{font-size:13px;font-weight:500;color:var(--text);line-height:1.3;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fb .fd{font-size:11.5px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fr{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .fdate{font-size:11px;color:var(--text3);white-space:nowrap}
  .farrow{font-size:15px;color:var(--text3)}

  /* ── 빈 상태 ── */
  .empty-row{background:var(--bg2);border:.5px dashed var(--border2);border-radius:var(--rs);padding:16px 18px;font-size:13px;color:var(--text3)}
  .no-result{text-align:center;padding:56px 0;color:var(--text3);font-size:13px}
  .no-result .nr-icon{font-size:32px;margin-bottom:10px}

  /* ── 배지 ── */
  .badge{display:inline-block;font-size:10.5px;font-weight:500;border-radius:20px;padding:2px 8px;white-space:nowrap}
  .b-blue  {background:var(--blue-bg);  color:var(--blue)}
  .b-teal  {background:var(--teal-bg);  color:var(--teal)}
  .b-amber {background:var(--amber-bg); color:var(--amber)}
  .b-gray  {background:var(--gray-bg);  color:var(--gray)}
  .b-green {background:var(--green-bg); color:var(--green)}
  .b-purple{background:var(--purple-bg);color:var(--purple)}
  .b-coral {background:var(--coral-bg); color:var(--coral)}
  .b-red   {background:var(--red-bg);   color:var(--red)}

  /* 타입별 아이콘 bg */
  .ti-review {background:var(--blue-bg)}
  .ti-note   {background:var(--purple-bg)}
  .ti-ref    {background:var(--teal-bg)}
  .ti-report {background:var(--coral-bg)}
  .ti-spec   {background:var(--green-bg)}
  .ti-data   {background:var(--amber-bg)}
  .ti-etc    {background:var(--gray-bg)}

  @media(max-width:700px){
    aside{display:none}
    main{padding:24px 16px 60px}
    .fb .fd,.fdate{display:none}
  }
</style>
</head>
<body>
<div class="shell">
<aside id="sidebar"></aside>
<main>
  <div class="ph">
    <div class="ph-eye">Research Archive</div>
    <h1>Research Notes</h1>
    <p class="ph-sub">논문 리뷰 · 연구노트 · 참고자료를 주제별 · 프로젝트별로 탐색합니다.</p>
  </div>

  <div class="tabs">
    <button class="tab-btn on" id="tab-topic"   onclick="switchTab('topic')">📚 주제별</button>
    <button class="tab-btn"   id="tab-project" onclick="switchTab('project')">🗂 프로젝트별</button>
  </div>

  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" id="search" placeholder="제목, 태그, 설명으로 검색…" oninput="render()">
  </div>

  <div id="content"></div>
</main>
</div>

<!-- ════════════════════════════════════════════════════════════════
     ★  데이터 영역  —  update_archive.py 가 자동 갱신합니다
════════════════════════════════════════════════════════════════ -->
<script>

// ── 문서 타입 정의 ──────────────────────────────────────────────
const DOC_TYPE = {
  review: { label: '논문리뷰',  icon: '📑', ti: 'ti-review', badge: 'b-blue'   },
  note:   { label: '연구노트',  icon: '🔬', ti: 'ti-note',   badge: 'b-purple' },
  ref:    { label: '참고자료',  icon: '📌', ti: 'ti-ref',    badge: 'b-teal'   },
  report: { label: '보고서',    icon: '📄', ti: 'ti-report', badge: 'b-coral'  },
  spec:   { label: '설계문서',  icon: '📐', ti: 'ti-spec',   badge: 'b-green'  },
  data:   { label: '데이터',    icon: '📊', ti: 'ti-data',   badge: 'b-amber'  },
  etc:    { label: '기타',      icon: '📎', ti: 'ti-etc',    badge: 'b-gray'   },
};

// ── 주제 데이터 ─────────────────────────────────────────────────
// update_archive.py 가 topics 배열 전체를 자동 교체합니다.
const topics = [

  // ── computer-vision ──
  {
    "id": "computer-vision",
    "icon": "👁",
    "iconBg": "#E4EFFE",
    "label": "주제 · computer-vision",
    "title": "computer-vision",
    "color": "blue",
    subfolders: [
      {
        label: "preprocessing",
        files: [
          { "title": "비전전처리 CaseA v1", "desc": "", "file": "computer-vision/preprocessing/note_비전전처리_CaseA_v1.html", "type": "note", "date": "2026-03", "tags": [] },
        ],
      },
      {
        label: "tracking",
        files: [
          { "title": "ByteTrack v1", "desc": "ByteTrack", "file": "computer-vision/tracking/review_ByteTrack_v1.html", "type": "review", "date": "2026-03", "tags": ["ByteTrack"] },
        ],
      },
    ],
  },

  // ── machine-learning ──
  {
    "id": "machine-learning",
    "icon": "🧠",
    "iconBg": "#DFF5ED",
    "label": "주제 · machine-learning",
    "title": "machine-learning",
    "color": "teal",
    subfolders: [
      {
        label: "time-series",
        files: [
          { "title": "Temporal Fusion Transformer v1", "desc": "Transformer", "file": "machine-learning/time-series/review_Temporal_Fusion_Transformer_v1.html", "type": "review", "date": "2026-03", "tags": ["Transformer"] },
        ],
      },
    ],
  },

];


const projects = [

  // ── 자동 분체 도장라인 멀티모달 AI 불량예방 시스템 ──
  {
    "id": "자동-분체-도장라인-멀티모달-AI-불량예방-시스템",
    "icon": "🏭",
    "iconBg": "#E4EFFE",
    "label": "수요기관 · 대원공업㈜",
    "title": "자동 분체 도장라인 멀티모달 AI 불량예방 시스템",
    "color": "blue",
    subfolders: [
      {
        label: "",
        files: [
          { "title": "설계검토 v7", "desc": "", "file": "projects/자동 분체 도장라인 멀티모달 AI 불량예방 시스템/note_설계검토_v7.html", "type": "note", "date": "2026-03", "tags": [] },
          { "title": "엣지배포 검토", "desc": "배포", "file": "projects/자동 분체 도장라인 멀티모달 AI 불량예방 시스템/note_엣지배포_검토.md", "type": "note", "date": "2026-03", "tags": ["배포"] },
        ],
      },
    ],
  },

];

// ════════════════════════════════════════════════════════════════
//  렌더링 (수정 불필요)
// ════════════════════════════════════════════════════════════════
let currentTab = 'topic';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-topic').classList.toggle('on', tab === 'topic');
  document.getElementById('tab-project').classList.toggle('on', tab === 'project');
  render();
}

function T(t) { return DOC_TYPE[t] || DOC_TYPE.etc; }

function badgeHtml(color, text) {
  return `<span class="badge b-${color}">${text}</span>`;
}

function tagBadges(tags) {
  return (tags||[]).map(t => `<span class="badge b-gray" style="font-size:10px;padding:1px 6px">${t}</span>`).join('');
}

function fileRowHtml(f) {
  const t = T(f.type);
  return `
  <a class="file-row" href="${f.file}">
    <div class="ft-icon ${t.ti}">${t.icon}</div>
    <div class="fb">
      <div class="ft">${f.title}</div>
      <div class="fd">${f.desc||''}</div>
    </div>
    <div class="fr">
      <span class="badge ${t.badge}">${t.label}</span>
      ${tagBadges(f.tags)}
      <span class="fdate">${f.date||''}</span>
      <span class="farrow">›</span>
    </div>
  </a>`;
}

function subfolderHtml(sf, q) {
  const files = q
    ? sf.files.filter(f =>
        f.title.toLowerCase().includes(q) ||
        (f.desc||'').toLowerCase().includes(q) ||
        (f.tags||[]).some(t => t.toLowerCase().includes(q)))
    : sf.files;
  if (q && files.length === 0) return '';
  let h = `<div class="subfolder">`;
  if (sf.label) h += `<div class="subfolder-label">📁 ${sf.label}</div>`;
  h += `<div class="file-list">`;
  if (files.length === 0) {
    h += `<div class="empty-row">📭 &nbsp;파일이 없습니다.</div>`;
  } else {
    files.forEach(f => { h += fileRowHtml(f); });
  }
  h += `</div></div>`;
  return h;
}

function sectionHtml(sec, q) {
  const subHtmls = sec.subfolders.map(sf => subfolderHtml(sf, q)).filter(Boolean);
  if (q && subHtmls.length === 0) return '';

  const totalFiles = sec.subfolders.reduce((a, sf) => a + sf.files.length, 0);
  const types = [...new Set(sec.subfolders.flatMap(sf => sf.files.map(f => f.type)))];

  return `
  <div class="section-block" id="${sec.id}">
    <div class="section-header">
      <div class="sh-icon" style="background:${sec.iconBg}">${sec.icon}</div>
      <div class="sh-info">
        <div class="shi-label">${sec.label}</div>
        <h2>${sec.title}</h2>
        <div class="sh-meta">
          ${badgeHtml(sec.color, `파일 ${totalFiles}개`)}
          ${types.map(t => `<span class="badge ${T(t).badge}">${T(t).label}</span>`).join('')}
        </div>
      </div>
    </div>
    ${subHtmls.join('')}
  </div>`;
}

function render() {
  const q = (document.getElementById('search').value||'').toLowerCase().trim();
  const list = currentTab === 'topic' ? topics : projects;

  // 사이드바
  let nav = `
    <div class="aside-logo">
      <div class="al-tag">Research Archive</div>
      <div class="al-name">Research Notes</div>
    </div>
    <div class="aside-sec">${currentTab === 'topic' ? '주제' : '프로젝트'}</div>
    <ul>`;
  list.forEach(s => {
    const total = s.subfolders.reduce((a, sf) => a + sf.files.length, 0);
    nav += `<li><a href="#${s.id}">
      <span class="ni">${s.icon}</span>
      <span class="nl">${s.title}</span>
      <span class="nc">${total}</span>
    </a></li>`;
  });
  nav += `</ul>`;
  document.getElementById('sidebar').innerHTML = nav;

  // 콘텐츠
  let html = '';
  let any = false;
  list.forEach(sec => {
    const sh = sectionHtml(sec, q);
    if (sh) { html += sh; any = true; }
  });
  if (!any) {
    html = `<div class="no-result"><div class="nr-icon">🔍</div><div>"${q}"에 해당하는 문서가 없습니다</div></div>`;
  }
  document.getElementById('content').innerHTML = html;
  bindSpy();
}

function bindSpy() {
  window.onscroll = () => {
    const blocks = document.querySelectorAll('.section-block');
    const links  = document.querySelectorAll('aside ul li a');
    let cur = '';
    blocks.forEach(b => { if (b.getBoundingClientRect().top <= 80) cur = b.id; });
    links.forEach(a => a.classList.toggle('active', a.getAttribute('href') === `#${cur}`));
  };
}

document.addEventListener('click', e => {
  const a = e.target.closest('a[href^="#"]');
  if (!a) return;
  e.preventDefault();
  const el = document.getElementById(a.getAttribute('href').slice(1));
  if (el) el.scrollIntoView({behavior:'smooth',block:'start'});
});

render();
</script>
</body>
</html>
